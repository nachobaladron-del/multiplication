<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Skoolyst - Multiplication Trainer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.2s;
    }
    body.correct { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%) !important; }
    body.wrong   { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%) !important; }
    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: calc(100% - 32px);
      max-width: 420px;
      height: calc(100dvh - 32px);
      max-height: 760px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 20px 14px;
      gap: 8px;
    }
    .topRow { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .timerWrap { position: relative; width: 68px; height: 68px; flex-shrink: 0; }
    .timerWrap svg { transform: rotate(-90deg); width: 68px; height: 68px; }
    .timerNumber {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px; font-weight: 900; color: #2c3e50; transition: color 0.3s;
    }
    .timerNumber.warning { color: #e74c3c; animation: pulse 0.5s infinite; }
    @keyframes pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%      { transform: translate(-50%,-50%) scale(1.15); }
    }
    .progressWrap { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    #progress { font-size: 20px; font-weight: 900; color: #2c3e50; }
    .scoreBar { width: 100%; height: 8px; background: #ecf0f1; border-radius: 4px; overflow: hidden; }
    .scoreProgress { height: 100%; background: linear-gradient(90deg,#9ff527,#6dd400); width: 0%; transition: width 0.3s; }
    .gameArea { display: flex; flex-direction: column; flex: 1; overflow: hidden; gap: 8px; }
    #question {
      font-size: clamp(56px, 18vw, 90px);
      font-weight: 900; color: #2c3e50; text-align: center;
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    #answer {
      font-size: 34px; height: 60px; width: 180px;
      margin: 0 auto; text-align: center; display: block;
      border: 3px solid #3498db; border-radius: 12px;
      padding: 8px; font-weight: 600; color: #2c3e50; flex-shrink: 0;
    }
    #answer:focus { outline: none; border-color: #9ff527; box-shadow: 0 0 0 4px rgba(159,245,39,0.2); }
    .keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; flex-shrink: 0; }
    button {
      font-size: clamp(20px,5.5vw,26px); height: clamp(54px,13vw,70px);
      border-radius: 14px; border: none;
      background: linear-gradient(135deg,#9ff527 0%,#7dd400 100%);
      color: #2c3e50; cursor: pointer; font-weight: 700;
      transition: transform 0.12s; box-shadow: 0 4px 10px rgba(159,245,39,0.3);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    button:active { transform: scale(0.93); }
    button.action {
      background: linear-gradient(135deg,#3498db 0%,#2980b9 100%);
      color: white; box-shadow: 0 4px 10px rgba(52,152,219,0.3);
    }
    #result { display: none; flex-direction: column; overflow-y: auto; flex: 1; }
    .finalScore { background: linear-gradient(135deg,#9ff527 0%,#7dd400 100%); color: #2c3e50; padding: 20px; border-radius: 16px; }
    .finalScore h2 { margin: 0 0 14px; font-size: 24px; text-align: center; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 4px; }
    .statCard { background: #ecf0f1; padding: 10px; border-radius: 12px; text-align: center; }
    .statCard .value { font-size: 24px; font-weight: 900; color: #2c3e50; }
    .statCard .label { font-size: 12px; color: #7f8c8d; margin-top: 3px; }
    .restartBtn { margin-top: 14px; padding: 12px 32px; font-size: 20px; height: auto; width: 100%; background: linear-gradient(135deg,#3498db 0%,#2980b9 100%); color: white; }
    .celebration { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000; }
    .confetti { position:absolute;width:10px;height:10px;animation:confettiFall 3s linear; }
    @keyframes confettiFall { 0%{transform:translateY(-100vh) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }
    .dancingAnimal { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;animation:dance 1s infinite; }
    @keyframes dance { 0%,100%{transform:translate(-50%,-50%) rotate(-3deg) scale(1);} 25%,75%{transform:translate(-50%,-50%) rotate(3deg) scale(1.05);} }
    .segment { stroke:#9ff527;stroke-width:14;fill:none;opacity:1;transition:opacity 0.2s; }
  </style>
</head>
<body>
  <div class="celebration" id="celebration"></div>
  <div class="container">
    <div class="topRow">
      <div class="timerWrap">
        <svg id="donut" viewBox="0 0 100 100"></svg>
        <div class="timerNumber" id="timerNumber">6</div>
      </div>
      <div class="progressWrap">
        <div id="progress">1 / 25</div>
        <div class="scoreBar"><div class="scoreProgress" id="scoreProgress"></div></div>
      </div>
    </div>
    <div class="gameArea" id="gameArea">
      <div id="question"></div>
      <input id="answer" type="number" readonly inputmode="none" />
      <div class="keypad" id="keypad">
        <button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
        <button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
        <button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
        <button class="action" onclick="deleteDigit()">DEL</button>
        <button onclick="press(0)">0</button>
        <button class="action" onclick="submitAnswer()">&#10003;</button>
      </div>
    </div>
    <div id="result"></div>
  </div>
  <script>
    let questionTime=6,timer,segmentTimer,current;
    let score=0,count=0,segments=[];
    let streak=0,maxStreak=0,wrongAnswers=0,totalTime=0;
    let mistakes=[],questionsAsked=[],persistentMistakes=[];
    const audioContext=new (window.AudioContext||window.webkitAudioContext)();
    function loadPersistentMistakes(){try{const s=localStorage.getItem('skoolyst_mistakes');if(s)persistentMistakes=JSON.parse(s);}catch(e){}}
    function savePersistentMistakes(){try{localStorage.setItem('skoolyst_mistakes',JSON.stringify(persistentMistakes));}catch(e){}}
    function addPersistentMistake(a,b){const mn=Math.min(a,b),mx=Math.max(a,b);const ex=persistentMistakes.find(m=>m.a===mn&&m.b===mx);if(!ex)persistentMistakes.push({a:mn,b:mx,count:1});else ex.count++;savePersistentMistakes();}
    function removePersistentMistake(a,b){const mn=Math.min(a,b),mx=Math.max(a,b);persistentMistakes=persistentMistakes.filter(m=>!(m.a===mn&&m.b===mx));savePersistentMistakes();}
    function playSound(t){try{const o=audioContext.createOscillator(),g=audioContext.createGain();o.connect(g);g.connect(audioContext.destination);if(t==='correct'){o.frequency.value=523.25;g.gain.setValueAtTime(0.3,audioContext.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+0.3);o.start(audioContext.currentTime);o.stop(audioContext.currentTime+0.3);}else if(t==='wrong'){o.frequency.value=200;o.type='sawtooth';g.gain.setValueAtTime(0.2,audioContext.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+0.4);o.start(audioContext.currentTime);o.stop(audioContext.currentTime+0.4);}else if(t==='click'){o.frequency.value=800;g.gain.setValueAtTime(0.1,audioContext.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+0.1);o.start(audioContext.currentTime);o.stop(audioContext.currentTime+0.1);}}catch(e){}}
    function createConfetti(){const c=document.getElementById('celebration');for(let i=0;i<50;i++){const el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'%';el.style.animationDelay=Math.random()*0.5+'s';el.style.backgroundColor=['#9ff527','#3498db','#e74c3c','#f39c12','#9b59b6'][Math.floor(Math.random()*5)];c.appendChild(el);setTimeout(()=>el.remove(),3000);}}
    function createDonut(){const svg=document.getElementById("donut");svg.innerHTML="";segments=[];const cx=50,cy=50,r=40,tot=12;for(let i=0;i<tot;i++){const s=(i/tot)*2*Math.PI,e=((i+1)/tot)*2*Math.PI;const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);const p=document.createElementNS("http://www.w3.org/2000/svg","path");p.setAttribute("d","M "+x1+" "+y1+" A "+r+" "+r+" 0 0 1 "+x2+" "+y2);p.setAttribute("class","segment");svg.appendChild(p);segments.push(p);}}
    function randomQ(){let a,b,isRetry=false;if(persistentMistakes.length>0&&Math.random()<0.25){const m=persistentMistakes[Math.floor(Math.random()*persistentMistakes.length)];a=m.a;b=m.b;isRetry=true;}else{a=Math.ceil(Math.random()*12);b=Math.ceil(Math.random()*12);}const sw=Math.random()<0.5;const fA=sw?b:a,fB=sw?a:b;return{a:fA,b:fB,ans:fA*fB,isRetry};}
    function newQuestion(){if(count>=25){endGame();return;}current=randomQ();questionsAsked.push({question:current.a+"x"+current.b,correctAnswer:current.ans,a:current.a,b:current.b});document.getElementById("question").innerText=current.a+" × "+current.b;document.getElementById("progress").innerText=(count+1)+" / 25";document.getElementById("answer").value="";document.getElementById("scoreProgress").style.width=(score/Math.max(count,1)*100)+"%";createDonut();startTimer();}
    function startTimer(){clearInterval(timer);clearInterval(segmentTimer);let time=questionTime,si=0;const t0=Date.now(),el=document.getElementById("timerNumber");el.innerText=time;el.classList.remove('warning');segmentTimer=setInterval(()=>{if(si<segments.length){segments[si].style.opacity="0.1";si++;}},500);timer=setInterval(()=>{time--;el.innerText=time;if(time<=2)el.classList.add('warning');if(time<=0){clearInterval(timer);clearInterval(segmentTimer);totalTime+=(Date.now()-t0)/1000;mistakes.push({a:current.a,b:current.b,ans:current.ans,userAnswer:'timeout'});questionsAsked[questionsAsked.length-1].userAnswer='Timeout';questionsAsked[questionsAsked.length-1].correct=false;addPersistentMistake(current.a,current.b);feedback(false);}},1000);}
    function press(n){playSound('click');const inp=document.getElementById("answer");if(inp.value.length<3)inp.value+=n;}
    function deleteDigit(){playSound('click');const inp=document.getElementById("answer");inp.value=inp.value.slice(0,-1);}
    function submitAnswer(){const val=document.getElementById("answer").value;if(val==='')return;clearInterval(timer);clearInterval(segmentTimer);const ok=Number(val)===current.ans;if(ok){score++;streak++;maxStreak=Math.max(maxStreak,streak);playSound('correct');questionsAsked[questionsAsked.length-1].userAnswer=Number(val);questionsAsked[questionsAsked.length-1].correct=true;if(current.isRetry)removePersistentMistake(current.a,current.b);}else{wrongAnswers++;streak=0;playSound('wrong');mistakes.push({a:current.a,b:current.b,ans:current.ans,userAnswer:Number(val)});questionsAsked[questionsAsked.length-1].userAnswer=Number(val);questionsAsked[questionsAsked.length-1].correct=false;addPersistentMistake(current.a,current.b);}feedback(ok);}
    function feedback(ok){document.body.classList.add(ok?"correct":"wrong");setTimeout(()=>{document.body.classList.remove("correct","wrong");count++;newQuestion();},500);}
    function endGame(){const acc=((score/25)*100).toFixed(0);document.getElementById("gameArea").style.display="none";document.getElementById("timerNumber").style.display="none";document.getElementById("donut").style.display="none";let perf="";if(score===25){perf="PERFECT! ⭐⭐⭐";createConfetti();showDancingAnimal();}else if(score>=23){perf="Outstanding! ⭐";createConfetti();}else if(score>=20){perf="Excellent! 🎯";createConfetti();}else if(score>=15){perf="Good job! 👍";}else{perf="Keep practicing! 💪";}let mHTML='';if(mistakes.length>0){mHTML='<div style="margin-top:14px;background:#fff3cd;padding:14px;border-radius:12px;border:2px solid #ffc107;"><h3 style="margin:0 0 10px;color:#856404;font-size:17px;">📝 Review Your Mistakes</h3><div style="max-height:200px;overflow-y:auto;">'+mistakes.map(m=>'<div style="background:white;padding:9px;margin-bottom:7px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:17px;font-weight:700;">'+m.a+' × '+m.b+'</span><div style="text-align:right;"><div style="font-size:13px;color:#e74c3c;">'+(m.userAnswer==='timeout'?'⏰ Timeout':'Your answer: '+m.userAnswer)+'</div><div style="font-size:13px;color:#27ae60;font-weight:600;">✓ Correct: '+m.ans+'</div></div></div>').join('')+'</div></div>';}let pHTML='';if(persistentMistakes.length>0){pHTML='<div style="margin-top:10px;background:#e3f2fd;padding:12px;border-radius:12px;border:2px solid #2196F3;"><div style="color:#1565c0;font-size:15px;font-weight:600;">💡 You have '+persistentMistakes.length+' question(s) to keep practicing</div><div style="color:#1976d2;font-size:13px;margin-top:3px;">These will appear more often until you get them right!</div></div>';}const res=document.getElementById("result");res.style.cssText="display:flex;flex-direction:column;overflow-y:auto;flex:1;";res.innerHTML='<div class="finalScore"><h2>'+perf+'</h2><div class="stats"><div class="statCard"><div class="value">'+score+'/25</div><div class="label">Correct</div></div><div class="statCard"><div class="value">'+acc+'%</div><div class="label">Accuracy</div></div><div class="statCard"><div class="value">'+maxStreak+'</div><div class="label">Best Streak</div></div></div>'+mHTML+pHTML+'<button class="restartBtn" onclick="restartGame()">Play Again</button></div>';}
    function showDancingAnimal(){const gifs=['https://media.tenor.com/XqF0d6x6OKkAAAAi/dancing-cat.gif','https://media.tenor.com/cOUW3qFK4h4AAAAi/bear-dancing.gif','https://media.tenor.com/YaBbVuWIxNgAAAAi/dog-dancing.gif','https://media.tenor.com/2MJt0B_L_1IAAAAi/dancing-panda.gif','https://media.tenor.com/kv1IJqQexVYAAAAi/dancing-bunny.gif'];const d=document.createElement('div');d.className='dancingAnimal';d.innerHTML='<img src="'+gifs[Math.floor(Math.random()*gifs.length)]+'" style="width:240px;height:240px;object-fit:contain;">';document.body.appendChild(d);setTimeout(()=>d.remove(),4000);}
    function restartGame(){score=0;count=0;streak=0;maxStreak=0;wrongAnswers=0;totalTime=0;mistakes=[];questionsAsked=[];document.getElementById("gameArea").style.display="flex";document.getElementById("timerNumber").style.display="";document.getElementById("donut").style.display="";const res=document.getElementById("result");res.style.display="none";res.innerHTML="";document.getElementById("scoreProgress").style.width="0%";newQuestion();}
    document.addEventListener('keydown',(e)=>{if(count>=25)return;if(e.key>='0'&&e.key<='9')press(parseInt(e.key));else if(e.key==='Backspace'){e.preventDefault();deleteDigit();}else if(e.key==='Enter'){e.preventDefault();submitAnswer();}});
    loadPersistentMistakes();
    newQuestion();
  </script>
</body>
</html>
